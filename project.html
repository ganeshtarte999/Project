<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Lab - Rank of Matrix</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{font-family:Segoe UI;background:#f4f6f9;margin:0;}

header{
background:#2c3e50;color:white;padding:15px;
display:flex;justify-content:center;font-size:22px;
}

.container{padding:30px;}

.aim-sections{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.section-card{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.section-card:hover{
transform:translateY(-5px);
border:2px solid #3498db;
}

.section-card i{font-size:28px;color:#3498db;margin-bottom:10px;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
width:70%;
margin:5% auto;
padding:25px;
border-radius:10px;
position:relative;
}

.close-btn{
position:absolute;
right:20px;
top:10px;
font-size:28px;
cursor:pointer;
}

textarea{width:100%;padding:10px;font-size:14px;}

button{
background:#3498db;color:white;
border:none;padding:10px 20px;
cursor:pointer;border-radius:5px;
}

button:hover{background:#2c80b9;}
</style>
</head>

<body>

<header>Virtual Lab - Rank of Matrix</header>

<div class="container">
<div class="aim-sections">

<div class="section-card"><i class="fas fa-bullseye"></i><h3>Aim</h3></div>
<div class="section-card"><i class="fas fa-book"></i><h3>Theory</h3></div>
<div class="section-card"><i class="fas fa-question"></i><h3>Pretest</h3></div>
<div class="section-card"><i class="fas fa-desktop"></i><h3>Simulation</h3></div>
<div class="section-card"><i class="fas fa-check"></i><h3>Posttest</h3></div>
<div class="section-card"><i class="fas fa-book-open"></i><h3>References</h3></div>
<div class="section-card"><i class="fas fa-users"></i><h3>Contributors</h3></div>
<div class="section-card"><i class="fas fa-comment"></i><h3>Feedback</h3></div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close-btn">&times;</span>
<h2 id="modalTitle"></h2>
<div id="modalBody"></div>
</div>
</div>

<script>

const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");
const closeBtn = document.querySelector(".close-btn");

const contentData = {

"Aim": "<p>To determine rank of matrix using row operations.</p>",

"Theory": "<p>Rank is number of independent rows/columns.</p>",

"Pretest": "<p>1. Define matrix<br>2. Define rank</p>",

"Simulation": `
<h3>Matrix Rank Calculator</h3>

<p>Enter matrix (comma separated rows):</p>

<textarea id="matrixInput">
1,2,3
4,5,6
7,8,9
</textarea>

<br><br>

<button onclick="calculateRank()">Calculate Rank</button>

<h3 id="result"></h3>
`,

"Posttest": "<p>Solve problems.</p>",

"References": "<p>B.S. Grewal</p>",

"Contributors": "<p>Dept. of Applied Sciences</p>",

"Feedback": "<p>Give feedback.</p>"

};

document.querySelectorAll(".section-card").forEach(card=>{
card.addEventListener("click", ()=>{

let section = card.querySelector("h3").innerText;

modalTitle.innerText = section;
modalBody.innerHTML = contentData[section];

modal.style.display="block";

});
});

closeBtn.onclick = ()=> modal.style.display="none";

window.onclick = (e)=>{
if(e.target==modal){modal.style.display="none";}
};

/* CALL PYTHON */
function calculateRank(){

let input = document.getElementById("matrixInput").value;

let matrix = input.trim().split("\n").map(row =>
row.split(",").map(x => Number(x.trim()))
);

let rank = getRank(matrix);

document.getElementById("result").innerText = "Rank = " + rank;
}


// Gaussian elimination rank
function getRank(matrix) {
    let m = matrix.length;
    let n = matrix[0].length;
    let rank = n;

    for (let row = 0; row < rank; row++) {

        if (matrix[row][row] != 0) {

            for (let col = 0; col < m; col++) {
                if (col != row) {
                    let mult = matrix[col][row] / matrix[row][row];
                    for (let i = 0; i < rank; i++) {
                        matrix[col][i] -= mult * matrix[row][i];
                    }
                }
            }

        } else {

            let reduce = true;

            for (let i = row + 1; i < m; i++) {
                if (matrix[i][row] != 0) {
                    [matrix[row], matrix[i]] = [matrix[i], matrix[row]];
                    reduce = false;
                    break;
                }
            }

            if (reduce) {
                rank--;

                for (let i = 0; i < m; i++)
                    matrix[i][row] = matrix[i][rank];
            }

            row--;
        }
    }

    return rank;
}

</script>

</body>
</html>
